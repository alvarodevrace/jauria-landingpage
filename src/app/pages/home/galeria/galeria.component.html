<section class="galeria section" id="galeria">
  <div class="container">
    <div class="galeria__header">
      <div>
        <span class="section-eyebrow">Así se vive Jauría</span>
        <h2 class="section-title">UN BOX QUE QUIERES HABITAR</h2>
      </div>
      <p class="section-subtitle">
        Si estás evaluando dónde empezar, estas fotos te muestran lo importante: energía real, espacio real y gente real entrenando.
      </p>
    </div>

    <div class="galeria__grid">
      @for (image of images; track image.src) {
        <div
          class="galeria__item"
          [class.galeria__item--featured]="image.featured"
          (click)="openLightbox(image.src, image.alt)"
        >
          <img
            [src]="image.src"
            [alt]="image.alt"
            class="galeria__img"
            loading="lazy"
          >
          <div class="galeria__overlay">
            <span>Ver foto</span>
          </div>
        </div>
      }
    </div>
  </div>
</section>

<!-- Lightbox -->
@if (lightboxImage) {
  <div class="lightbox" (click)="onLightboxBackdropClick($event)">
    <button class="lightbox__close" (click)="closeLightbox()" aria-label="Cerrar">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
    <img [src]="lightboxImage" [alt]="lightboxAlt" class="lightbox__image">
  </div>
}
