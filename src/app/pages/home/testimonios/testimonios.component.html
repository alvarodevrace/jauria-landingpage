<section class="testimonios section" id="testimonios">
  <div class="container">
    <div class="section__header">
      <span class="section-eyebrow">Comunidad Jauría</span>
      <h2 class="section-title">TESTIMONIOS REALES</h2>
      <p class="section-subtitle">
        Menos promesas vacías. Más gente que decidió quedarse porque entrenar aquí sí se siente distinto.
      </p>
    </div>

    <div class="testimonios__grid">
      @for (t of testimonios; track t.name) {
        <article class="testimonio-card">
          <div class="testimonio-card__eyebrow">{{ t.role }}</div>
          <div class="testimonio-card__author">
            <div class="testimonio-card__avatar" [style.background]="t.color">
              {{ t.initials }}
            </div>
            <div class="testimonio-card__info">
              <span class="testimonio-card__name">{{ t.name }}</span>
            </div>
          </div>
            <blockquote class="testimonio-card__text">
              {{ t.text }}
            </blockquote>
        </article>
      }
    </div>
  </div>
</section>
