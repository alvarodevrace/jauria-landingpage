name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-landing-prod
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy Landing Page
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Coolify
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.COOLIFY_BASE_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_UUID_LANDING }}&force=true" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json")
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "Deploy failed with HTTP $response"
            exit 1
          fi
          echo "Deploy queued successfully (HTTP $response)"
